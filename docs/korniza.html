<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightroom Photo Downloader</title>
</head>
<body>
  <h1>Lightroom Photo Downloader</h1>
  <button id="authenticate">Authenticate with Adobe</button>
  <button id="downloadPhotos" disabled>Download 20 Random Photos</button>
  <div id="status"></div>

  <script>
    const CLIENT_ID = "9bddf27935e44905bcae5465c53d3238"; // Replace with your Adobe Client ID
    const REDIRECT_URI = `${window.location.origin}`;
    let accessToken = null;

    document.getElementById('authenticate').addEventListener('click', () => {
        const authURL = `https://ims-na1.adobelogin.com/ims/authorize/v2?client_id=${CLIENT_ID}&scope=openid,lr_partner_apis&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
      window.location.href = authURL;
    });

    // Check for access token in URL fragment after redirect
    if (window.location.hash) {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      accessToken = params.get('access_token');

      if (accessToken) {
        document.getElementById('status').innerText = 'Authenticated successfully!';
        document.getElementById('downloadPhotos').disabled = false;
      }
    }

    document.getElementById('downloadPhotos').addEventListener('click', async () => {
      if (!accessToken) {
        alert('Please authenticate first!');
        return;
      }

      try {
        // Fetch photo metadata
        const response = await fetch('https://lr.adobe.io/v2/catalogs/primary/assets', {
          headers: {
            Authorization: `Bearer ${accessToken}`,
          },
        });

        if (!response.ok) {
          throw new Error('Failed to fetch photos');
        }

        const data = await response.json();
        const photos = data.resources;

        if (photos.length === 0) {
          alert('No photos available in your Lightroom account.');
          return;
        }

        // Shuffle and select 20 random photos
        const randomPhotos = photos.sort(() => 0.5 - Math.random()).slice(0, 20);

        // Download each photo
        randomPhotos.forEach((photo, index) => {
          const a = document.createElement('a');
          a.href = photo.links.download;
          a.download = `photo_${index + 1}.jpg`;
          a.click();
        });

        alert('Downloaded 20 random photos.');
      } catch (error) {
        console.error('Error downloading photos:', error);
        alert('Failed to download photos.');
      }
    });
  </script>
</body>
</html>
