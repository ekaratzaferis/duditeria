<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightroom Gallery</title>
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }
        .photo {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            font-family: sans-serif;
        }
        .error {
            color: red;
            padding: 1rem;
            border: 1px solid red;
            margin: 1rem;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="gallery" class="gallery">
        <div class="loading">Loading photos...</div>
    </div>

    <script>
        const CLIENT_ID = '3a24deb0ee6e49fcacbec007c67f9084';
        const CLIENT_SECRET = 'p8e-gClwj947HQ14Vu_Cq3pswFeT1iayGiUp';
        const REDIRECT_URI = 'https://duditeria.com/korniza';
        
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const gallery = document.getElementById('gallery');

            if (error) {
                gallery.innerHTML = `<div class="error">Authentication Error: ${error}</div>`;
                return;
            }

            if (!code) {
                const state = Math.random().toString(36).substring(7);
                const authUrl = `https://ims-na1.adobelogin.com/ims/authorize/v2?` +
                    `client_id=${CLIENT_ID}` +
                    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
                    `&scope=AdobeID,openid,lr_partner_apis,offline_access,lr_partner_rendition_apis` +
                    `&response_type=code` +
                    `&state=${state}`;
                window.location.href = authUrl;
                return;
            }

            try {
                // Token exchange
                const tokenBody = new URLSearchParams({
                    grant_type: 'authorization_code',
                    client_id: CLIENT_ID,
                    client_secret: CLIENT_SECRET,
                    code: code,
                    redirect_uri: REDIRECT_URI
                });

                const tokenResponse = await fetch('https://ims-na1.adobelogin.com/ims/token/v3', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: tokenBody
                });

                if (!tokenResponse.ok) {
                    const errorText = await tokenResponse.text();
                    throw new Error(`Token Error (${tokenResponse.status}): ${errorText}`);
                }

                const tokenData = await tokenResponse.json();
                const accessToken = tokenData.access_token;

                if (!accessToken) {
                    throw new Error('No access token received');
                }

                // Get catalog
                const catalogResponse = await fetch('https://lr.adobe.io/v2/catalog', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'X-Api-Key': CLIENT_ID
                    }
                });

                if (!catalogResponse.ok) {
                    const errorText = await catalogResponse.text();
                    throw new Error(`Catalog Error (${catalogResponse.status}): ${errorText}`);
                }

                let catalogText = await catalogResponse.text();
                const catalog = JSON.parse(catalogText.replace('while(1){}', ''));
                
                // Get assets
                const assetsResponse = await fetch(`https://lr.adobe.io/v2/catalogs/${catalog.id}/assets?limit=20`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'X-Api-Key': CLIENT_ID
                    }
                });

                if (!assetsResponse.ok) {
                    const errorText = await assetsResponse.text();
                    throw new Error(`Assets Error (${assetsResponse.status}): ${errorText}`);
                }

                let assetsText = await assetsResponse.text();
                const assets = JSON.parse(assetsText.replace('while(1){}', ''));
                
                // Display photos
                gallery.innerHTML = '';
                
                assets.resources.forEach(asset => {
                    const img = document.createElement('img');
                    img.className = 'photo';
                    img.src = `${asset.links['/rels/rendition_type/2048']}?access_token=${accessToken}`;
                    img.alt = asset.payload.title || 'Untitled photo';
                    gallery.appendChild(img);
                });

            } catch (error) {
                console.error('Error:', error);
                gallery.innerHTML = `<div class="error">Error: ${error.message}\n\nCheck console for more details.</div>`;
            }
        }

        init();
    </script>
</body>
</html>
