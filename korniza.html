<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightroom Gallery</title>
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }
        .photo {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="gallery" class="gallery">
        <div class="loading">Loading photos...</div>
    </div>

    <script>
        const CLIENT_ID = '3a24deb0ee6e49fcacbec007c67f9084'; // Replace with your client ID
        const REDIRECT_URI = 'https://duditeria.com/korniza';
        
        async function init() {
            // Check if we have an access token
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');

            if (error) {
                document.getElementById('gallery').innerHTML = 
                    `<div class="loading">Authentication Error: ${error}</div>`;
                return;
            }

            if (!code) {
                // If no code, redirect to Adobe login
                const state = Math.random().toString(36).substring(7);
                const authUrl = `https://ims-na1.adobelogin.com/ims/authorize/v2?` +
                    `client_id=${CLIENT_ID}` +
                    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
                    `&scope=lr_partner_apis` +
                    `&response_type=code` +
                    `&state=${state}`;
                window.location.href = authUrl;
                return;
            }

            try {
                // Exchange code for access token
                const tokenResponse = await fetch('https://ims-na1.adobelogin.com/ims/token/v3', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: CLIENT_ID,
                        client_secret: 'YOUR_CLIENT_SECRET_HERE', // Add your client secret
                        code: code,
                        redirect_uri: REDIRECT_URI
                    })
                });
                
                const tokenData = await tokenResponse.json();
                const accessToken = tokenData.access_token;

                // Get catalog
                const catalogResponse = await fetch('https://lr.adobe.io/v2/catalog', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'X-Api-Key': CLIENT_ID
                    }
                });
                const catalog = await catalogResponse.json();
                
                // Get assets
                const assetsResponse = await fetch(`https://lr.adobe.io/v2/catalogs/${catalog.id}/assets?limit=20`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'X-Api-Key': CLIENT_ID
                    }
                });
                const assets = await assetsResponse.json();
                
                // Display photos
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                
                assets.resources.forEach(asset => {
                    const img = document.createElement('img');
                    img.className = 'photo';
                    img.src = `${asset.links['/rels/rendition_type/2048']}?access_token=${accessToken}`;
                    img.alt = asset.payload.title || 'Untitled photo';
                    gallery.appendChild(img);
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('gallery').innerHTML = 
                    '<div class="loading">Error loading photos. Please check console for details.</div>';
            }
        }

        init();
    </script>
</body>
</html>
